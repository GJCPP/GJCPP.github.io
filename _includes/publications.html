<section class="section">
  <h2>Publications</h2>
  <ol class="publications">
    {% for pub in site.data.publications %}
    <li>
      <strong>{{ pub.title }}</strong>. {{ pub.authors }} ({{ pub.year }}). <em>{{ pub.venue }}</em>.
      {% if pub.url %}
      <a href="{{ pub.url }}" target="_blank" rel="noopener">Link</a>
      {% endif %}
    </li>
    {% endfor %}
  </ol>
</section>
