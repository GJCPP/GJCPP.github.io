<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} | {{ site.author.name }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
  <main class="container">
    {% include profile-header.html %}

    {% assign statement = site.content | where: "slug", "statement" | first %}
    {% if statement %}
    <section class="section">
      <h2>About Me</h2>
      <div class="statement">
        {{ statement.content }}
      </div>
    </section>
    {% endif %}

    {% include publications.html %}
    {% include footer.html %}
  </main>
</body>
</html>
